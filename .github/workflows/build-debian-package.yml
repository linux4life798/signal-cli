name: Debian Package Builder

on: [push, pull_request]

jobs:
  build-debs:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build Debian package for amd64
        uses: jtdor/build-deb-action@v1
        env:
          DEB_BUILD_OPTIONS: noautodbgsym
          DEBFULLNAME: Craig Hesling
          DEBEMAIL: craig@hesling.com
          # GitHub runners can export host JAVA_HOME paths that are invalid
          # in the Debian container; clear it so gradle uses Java from PATH.
          JAVA_HOME: ""
        with:
          docker-image: debian:testing
          host-arch: amd64
          extra-build-deps: devscripts git
          # Stamp a fresh top changelog entry for CI using the current git-describe
          # output as the full Debian package version.
          before-build-hook: dch --controlmaint --distribution unstable --newversion "$(git describe --tags --always | sed 's/^v//')" "CI build"
          buildpackage-opts: --build=binary --no-sign

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signal-cli-debian-package-${{ github.sha }}
          path: debian/artifacts/*
